<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>GCPD.FHLCubhrdelegation2026</title>
<meta property="og:title" content="GCPD.FHLCubhrdelegation2026">
<meta property="og:description" content="Digital Delegation Packet — flip through the program, welcome, priorities, delegates and more. Presented by HaitiBiznis.com">
<meta property="og:type" content="website">
<meta property="og:url" content="https://delegation.haitibiznis.com/">
<meta property="og:image" content="https://delegation.haitibiznis.com/pages/p01.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --navy:#00215C; --navy3:#001741; --gold:#EFA31E; --gold-lt:#F4B740; }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{font-family:'Montserrat',system-ui,sans-serif;
    background:radial-gradient(120% 90% at 50% 0%, #16346f 0%, var(--navy) 45%, var(--navy3) 100%);
    color:#fff; min-height:100%; display:flex; flex-direction:column; align-items:center;
    padding:14px 10px 22px; overflow-x:hidden;}
  header{text-align:center; margin-bottom:12px;}
  header .kick{font-weight:700; font-size:10px; letter-spacing:.24em; color:var(--gold-lt); text-transform:uppercase;}
  header h1{font-weight:900; font-size:clamp(15px,4.6vw,22px); margin-top:5px; line-height:1.15;}
  header h1 span{color:var(--gold-lt);}
  .stage{width:100%; max-width:560px; display:flex; justify-content:center; touch-action:pan-y;}
  #flipbook{ box-shadow:0 20px 50px rgba(0,0,0,.5); }
  #flipbook img{width:100%; height:100%; display:block;}
  .controls{display:flex; align-items:center; gap:16px; margin-top:16px;}
  .btn{appearance:none; border:1.5px solid var(--gold); background:rgba(201,162,75,.14); color:#fff;
    font-family:'Montserrat'; font-weight:800; font-size:13px; letter-spacing:.04em;
    padding:10px 18px; border-radius:30px; cursor:pointer; display:flex; align-items:center; gap:8px;}
  .btn:active{transform:scale(.96);}
  .pagemark{font-weight:700; font-size:12px; color:#c9d4ea; min-width:74px; text-align:center;}
  .hint{margin-top:12px; font-size:11px; color:#9fb0d0; letter-spacing:.03em;}
  .dl{margin-top:16px; display:flex; gap:12px; flex-wrap:wrap; justify-content:center;}
  .dl a{color:var(--navy3); background:linear-gradient(135deg,#F4B740,#EFA31E 60%,#DF9001);
    text-decoration:none; font-weight:800; font-size:12.5px; letter-spacing:.05em;
    padding:11px 22px; border-radius:30px; display:inline-flex; align-items:center; gap:8px;
    box-shadow:0 8px 20px rgba(0,0,0,.3);}
  .dl a#share{background:rgba(239,163,30,.16); color:#fff; border:1.5px solid var(--gold);}
  .toast{position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#00215C; border:1.5px solid var(--gold); color:#fff; font-size:12.5px; font-weight:700;
    padding:11px 22px; border-radius:24px; opacity:0; pointer-events:none; transition:.3s; z-index:9;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .loading{color:#c9d4ea; font-size:13px; padding:60px 0;}
</style>
</head>
<body>
  <header>
    <div class="kick">Haitian Civil Society Delegation</div>
    <h1>United Nations <span>20<sup>th</sup> Human Rights Summit</span></h1>
  </header>

  <div class="stage">
    <div id="flipbook"><div class="loading">Loading booklet…</div></div>
  </div>

  <div class="controls">
    <button class="btn" id="prev">‹ Prev</button>
    <div class="pagemark" id="mark">— / —</div>
    <button class="btn" id="next">Next ›</button>
  </div>
  <div class="hint">Swipe or tap the page edges to turn, just like a real book.</div>
  <div class="dl">
    <a href="UN-Delegation-Packet.pdf" download>⬇ Download PDF</a>
    <a href="#" id="share" role="button">⤴ Share</a>
  </div>
  <div class="toast" id="toast">Link copied to clipboard</div>

  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <script>
    var PAGES = [];
    for (var i=1;i<=14;i++){ PAGES.push('pages/p'+String(i).padStart(2,'0')+'.jpg'); }

    function calcSize(){
      var vw = Math.min(window.innerWidth-24, 540);
      var w = vw, h = Math.round(w*2104/1488);
      var maxH = window.innerHeight - 230;
      if (h > maxH){ h = maxH; w = Math.round(h*1488/2104); }
      return {w:w,h:h};
    }

    var el = document.getElementById('flipbook');
    el.innerHTML = '';
    var s = calcSize();
    var pageFlip = new St.PageFlip(el, {
      width: s.w, height: s.h,
      size: 'stretch',
      minWidth: 240, maxWidth: 560,
      minHeight: 340, maxHeight: 800,
      drawShadow: true, flippingTime: 700,
      usePortrait: true, showCover: true,
      mobileScrollSupport: true, maxShadowOpacity: 0.5
    });
    pageFlip.loadFromImages(PAGES);

    var mark = document.getElementById('mark');
    function updMark(){
      var cur = pageFlip.getCurrentPageIndex()+1;
      mark.textContent = cur + ' / ' + PAGES.length;
    }
    pageFlip.on('flip', updMark);
    pageFlip.on('init', updMark);
    document.getElementById('prev').onclick = function(){ pageFlip.flipPrev(); };
    document.getElementById('next').onclick = function(){ pageFlip.flipNext(); };

    // Share: native share sheet on mobile, copy-link fallback on desktop
    var toast = document.getElementById('toast');
    function showToast(msg){ toast.textContent = msg; toast.classList.add('show');
      setTimeout(function(){ toast.classList.remove('show'); }, 2200); }
    document.getElementById('share').onclick = function(e){
      e.preventDefault();
      var data = {
        title: 'UN 20th Human Rights Summit — Haitian Civil Society Delegation',
        text: 'Digital Delegation Packet — flip through the program, delegates, priorities and more.',
        url: location.href
      };
      if (navigator.share){ navigator.share(data).catch(function(){}); }
      else if (navigator.clipboard){ navigator.clipboard.writeText(location.href)
        .then(function(){ showToast('Link copied to clipboard'); })
        .catch(function(){ showToast(location.href); }); }
      else { window.prompt('Copy this link to share:', location.href); }
    };

    var rt;
    window.addEventListener('resize', function(){
      clearTimeout(rt);
      rt = setTimeout(function(){
        var ns = calcSize();
        pageFlip.update({width:ns.w, height:ns.h, size:'stretch'});
      }, 200);
    });
  </script>
</body>
</html>
